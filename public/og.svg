<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Technoliberals — AI Transformation & Product Engineering">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e17"/>
      <stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8093ff"/>
      <stop offset="1" stop-color="#5fe3cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#5b6cff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#5b6cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mark -->
  <g transform="translate(80 70)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="#0b0f18" stroke="#ffffff" stroke-opacity="0.12"/>
    <path d="M18 22h28M32 22v22" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="32" cy="46" r="5" fill="#0b0f18" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="18" cy="22" r="3" fill="#5fe3cf"/>
    <circle cx="46" cy="22" r="3" fill="#8093ff"/>
    <text x="84" y="42" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#eef1f7" letter-spacing="-0.5">Technoliberals</text>
  </g>

  <text x="80" y="320" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-2" fill="#eef1f7">AI Transformation &amp;</text>
  <text x="80" y="398" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-2" fill="#eef1f7">Product Engineering</text>

  <text x="80" y="468" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#9aa6bd">For transaction-heavy businesses in emerging markets.</text>

  <!-- Footer chips -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(80 540)">
      <rect x="0" y="0" width="340" height="48" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="28" cy="24" r="5" fill="url(#accent)"/>
      <text x="46" y="31" fill="#cdd4e3">Claude Partner Network Qualified</text>
    </g>
    <g transform="translate(440 540)">
      <rect x="0" y="0" width="430" height="48" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="28" cy="24" r="5" fill="#5fe3cf"/>
      <text x="46" y="31" fill="#cdd4e3">Fintech · Commerce · Logistics · Enterprise</text>
    </g>
  </g>
</svg>
